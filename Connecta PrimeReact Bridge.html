  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Connecta × PrimeReact — engineering bridge<\u002Ftitle>\n<style>/* ============================================================\n   Connecta — Colors & Type Foundations\n   A safe communication + AI learning layer for schools and families in the EU.\n   Built around the school graph: school → class → circle → child → parent → teacher.\n   Two AI characters live inside it:\n     · GoodTalk — child-safety moderation (calm, intervenes only on risk)\n     · Socratic    — Socratic homework helper (curious, never gives the answer)\n   ============================================================ */\n\n/* ---------- Web fonts ---------- */\n/* DM Sans — local variable fonts (uploaded brand assets) */\n@font-face {\n  font-family: \"DM Sans\";\n  src: url(\"fb31fbae-551a-4d7e-bb2c-8882b2a5d789\") format(\"truetype-variations\"),\n       url(\"fb31fbae-551a-4d7e-bb2c-8882b2a5d789\") format(\"truetype\");\n  font-weight: 100 1000;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"DM Sans\";\n  src: url(\"33c8f277-7483-44d5-9a91-8315a29457fa\") format(\"truetype-variations\"),\n       url(\"33c8f277-7483-44d5-9a91-8315a29457fa\") format(\"truetype\");\n  font-weight: 100 1000;\n  font-style: italic;\n  font-display: swap;\n}\n/* Monospace is retired — categories/labels use DM Sans. */\n\n:root {\n  /* ====================================================\n     CORE BRAND PALETTE (from brand sheet)\n     ==================================================== */\n  --connecta-coral:      #F35F49;   /* primary action / signature */\n  --connecta-lime:       #DEFB50;   /* secondary accent / \"go\" */\n  --connecta-pale-lime:  #ECFDA8;   /* tertiary tint */\n  --connecta-olive:      #424F1A;   /* deep alt accent */\n  --connecta-plum:       #571B32;   /* dark accent / serious tones */\n  --connecta-sky:        #BAE6FD;   /* kid-friendly soft blue surface */\n  --connecta-pink:       #FBE1FD;   /* pale lavender-pink — Teacher Tasks ground (paired with olive) */\n  --connecta-ink:        #0F1A24;   /* near-black ground */\n  --connecta-paper:      #FFFFFF;   /* clean white surface */\n\n  /* ====================================================\n     NEUTRALS (cool, slightly desaturated — calm, not clinical)\n     ==================================================== */\n  --neutral-0:   #FFFFFF;\n  --neutral-50:  #F7F8F9;\n  --neutral-100: #EEF1F3;\n  --neutral-200: #DDE2E7;\n  --neutral-300: #C3CBD3;\n  --neutral-400: #98A2AD;\n  --neutral-500: #6B7682;\n  --neutral-600: #4D5762;\n  --neutral-700: #343C46;\n  --neutral-800: #1E2630;\n  --neutral-900: #0F1A24;\n\n  /* ====================================================\n     BRAND TINTS — pale washes derived from the core hues.\n     These are the ONLY non-core surface colors allowed. Each is a\n     light tint of a brand hue (no invented blues / greens). Use them\n     as semantic grounds; pair with the matching deep hue for type.\n     ==================================================== */\n  --tint-coral: #FDEAE5;   /* pale coral — error / check / important grounds */\n  --tint-lime:  var(--connecta-pale-lime); /* #ECFDA8 — highlight / lab grounds */\n  --tint-olive: #EDF1DA;   /* pale olive — learning / Socratic grounds */\n  --tint-sky:   #E4F3FC;   /* pale sky — teacher / school / task grounds */\n  --tint-pink:  var(--connecta-pink);      /* #FBE1FD — social / friends grounds */\n  --tint-plum:  #F6ECF0;   /* pale plum — parent / guardian grounds */\n  --tint-ink:   var(--neutral-100);        /* neutral ink wash — calm / cooldown */\n\n  /* ====================================================\n     SEMANTIC FOREGROUND / BACKGROUND\n     \"Private by default\" → light, airy ground, ink type.\n     INK is the primary color: actions, writing, contours, bubbles.\n     ==================================================== */\n  --bg-page:       var(--neutral-0);\n  --bg-subtle:     var(--neutral-50);\n  --bg-muted:      var(--neutral-100);\n  --bg-inverse:    var(--connecta-ink);\n  --bg-card:       var(--neutral-0);\n  --bg-card-soft:  var(--neutral-50);\n\n  --fg-1:          var(--connecta-ink);     /* primary text */\n  --fg-2:          var(--neutral-700);      /* secondary text */\n  --fg-3:          var(--neutral-500);      /* tertiary / meta */\n  --fg-4:          var(--neutral-400);      /* placeholders, hairline labels */\n  --fg-on-ink:     var(--connecta-paper);\n  --fg-on-coral:   var(--connecta-paper);\n  --fg-on-lime:    var(--connecta-ink);\n\n  --border-1:      var(--neutral-200);\n  --border-2:      var(--neutral-300);\n  --border-strong: var(--connecta-ink);     /* contour = ink */\n\n  /* ====================================================\n     PRIMARY ACTION — INK\n     One primary everywhere: ink ground, paper type. Coral is no longer\n     a primary; it is reserved for error / check / important (below).\n     ==================================================== */\n  --action-primary-bg:    var(--connecta-ink);\n  --action-primary-fg:    var(--connecta-paper);\n  --action-primary-hover: var(--neutral-800);\n  --action-ghost-fg:      var(--connecta-ink);\n  --action-ghost-border:  var(--border-1);\n  --action-muted-bg:      var(--neutral-100);\n  --action-muted-fg:      var(--connecta-ink);\n\n  /* ====================================================\n     IMPORTANT / CHECK / ERROR — CORAL\n     GoodTalk safety (check), destructive actions, validation errors.\n     Calm by default; coral signals \"worth a look\", not panic.\n     ==================================================== */\n  --important-bg:     var(--tint-coral);\n  --important-fg:     var(--connecta-ink);\n  --important-accent: var(--connecta-coral);\n  --important-strong-bg: var(--connecta-coral);  /* solid coral chip / badge */\n  --important-strong-fg: var(--connecta-paper);\n\n  /* HIGHLIGHT — LIME (underline, highlight, experimental, lab) */\n  --highlight-bg:     var(--connecta-lime);\n  --highlight-fg:     var(--connecta-ink);\n  --highlight-soft:   var(--tint-lime);\n\n  /* ====================================================\n     INTERVENTION STATES (GoodTalk — coral family)\n     GoodTalk checks messages: nudge → warn → alert escalate within\n     coral. Repair-complete resolves to lime (\"go\"). Cooldown is a\n     calm ink wash. No red, no invented hues.\n     ==================================================== */\n  --state-nudge-bg:     var(--tint-coral);     /* gentle: \"want to rephrase?\" */\n  --state-nudge-fg:     var(--connecta-ink);\n  --state-nudge-accent: var(--connecta-coral);\n\n  --state-pause-bg:     var(--tint-ink);       /* slow mode / cooldown — calm */\n  --state-pause-fg:     var(--connecta-ink);\n  --state-pause-accent: var(--neutral-500);\n\n  --state-warn-bg:      var(--tint-coral);     /* warn — stronger coral accent */\n  --state-warn-fg:      var(--connecta-ink);\n  --state-warn-accent:  var(--connecta-coral);\n\n  --state-alert-bg:     var(--tint-coral);     /* reserved: real risk only */\n  --state-alert-fg:     var(--connecta-plum);  /* plum = gravity, parent-facing */\n  --state-alert-accent: var(--connecta-coral);\n\n  --state-ok-bg:        var(--tint-lime);      /* repair complete — \"go\" */\n  --state-ok-fg:        var(--connecta-olive);\n  --state-ok-accent:    var(--connecta-lime);\n\n  /* ====================================================\n     SOCRATIC AI — learning palette (OLIVE)\n     Socratic is the EOES lab coach: subjects, studies, science, learning.\n     Olive ground + lime \"lab / experimental\" accents. Socratic never gives\n     the answer; it asks the next question. Visually distinct from\n     GoodTalk (coral) so kids learn which AI is talking.\n     ==================================================== */\n  --socratic-bg:        var(--tint-olive);         /* Socratic reply bubble / panel */\n  --socratic-bg-strong: var(--connecta-olive);     /* hero / onboarding \"chalkboard\" */\n  --socratic-fg:        var(--connecta-olive);      /* readable on socratic-bg */\n  --socratic-fg-strong: var(--connecta-lime);       /* type on the olive ground */\n  --socratic-accent:    var(--connecta-lime);       /* lab / experimental highlight */\n  --socratic-ink:       var(--connecta-ink);\n  /* Socratic's learning-feedback states (never alarmist) */\n  --state-learn-bg:     var(--tint-olive);       /* \"checking your work\" */\n  --state-learn-fg:     var(--connecta-olive);\n  --state-learn-accent: var(--connecta-lime);\n  --state-progress-bg:     var(--tint-lime);     /* \"good start — go deeper\" */\n  --state-progress-fg:     var(--connecta-olive);\n  --state-progress-accent: var(--connecta-lime);\n\n  /* ====================================================\n     AUDIENCE SURFACE SCOPES\n     The user groups get distinct ambient surfaces so a viewer knows\n     immediately *whose* product they're inside. Scope is signaled by\n     ground color (the semantic hue), not by chrome change.\n       child   → pink (social / friends world)\n       teacher → sky  (teachers & schools)\n       parent  → plum (guardians)\n       school  → sky  (institutional)\n       socratic   → olive (learning)\n       tasks   → sky  (Teacher Tasks)\n     ==================================================== */\n  --scope-child-bg:    var(--neutral-0);     /* kids: clean white ground */\n  --scope-child-tint:  var(--tint-pink);     /* social / friends accent */\n  --scope-teacher-bg:  var(--neutral-50);    /* teachers: workmanlike off-white */\n  --scope-teacher-tint:var(--tint-sky);\n  --scope-parent-bg:   var(--neutral-0);     /* parents: white + plum reassurance */\n  --scope-parent-tint: var(--tint-plum);\n  --scope-school-bg:   var(--neutral-50);    /* school admin: institutional */\n  --scope-school-tint: var(--tint-sky);\n  --scope-socratic-bg:    var(--tint-olive);    /* learning canvases (Lab Circles, homework) */\n  --scope-tasks-bg:    var(--tint-sky);      /* Teacher Tasks: sky ground */\n  --scope-tasks-fg:    var(--connecta-ink);  /* Teacher Tasks: ink type */\n  --scope-tasks-accent:var(--connecta-ink);  /* Teacher Tasks: ink action */\n\n  /* ====================================================\n     MESSAGE BUBBLE TOKENS — one color language for chat\n     Who is speaking is read from the bubble color:\n       self     → ink   (your writing / primary)\n       incoming → neutral\n       friend   → pink  (social / voice messages from friends)\n       teacher  → sky\n       parent   → plum\n       socratic    → olive (learning)\n       goodtalk → coral (check / important)\n     ==================================================== */\n  --bubble-self-bg:     var(--connecta-ink);\n  --bubble-self-fg:     var(--connecta-paper);\n  --bubble-other-bg:    var(--neutral-100);\n  --bubble-other-fg:    var(--connecta-ink);\n  --bubble-friend-bg:   var(--tint-pink);\n  --bubble-friend-fg:   var(--connecta-ink);\n  --bubble-teacher-bg:  var(--tint-sky);\n  --bubble-teacher-fg:  var(--connecta-ink);\n  --bubble-parent-bg:   var(--tint-plum);\n  --bubble-parent-fg:   var(--connecta-plum);\n  --bubble-socratic-bg:    var(--connecta-olive);\n  --bubble-socratic-fg:    var(--connecta-lime);\n  --bubble-goodtalk-bg: var(--tint-coral);\n  --bubble-goodtalk-fg: var(--connecta-ink);\n\n  /* ====================================================\n     ROLE BADGE TOKENS — school graph identity\n     school → class → circle → child → parent → teacher\n     Used for tiny role tags next to names in chat, dashboards, audit logs.\n     ==================================================== */\n  --role-child-bg:    var(--tint-pink);\n  --role-child-fg:    var(--connecta-ink);\n  --role-teacher-bg:  var(--connecta-sky);\n  --role-teacher-fg:  var(--connecta-ink);\n  --role-parent-bg:   var(--tint-plum);\n  --role-parent-fg:   var(--connecta-plum);\n  --role-school-bg:   var(--connecta-sky);\n  --role-school-fg:   var(--connecta-ink);\n  --role-socratic-bg:    var(--connecta-olive);\n  --role-socratic-fg:    var(--connecta-lime);\n  --role-goodtalk-bg: var(--connecta-coral);\n  --role-goodtalk-fg: var(--connecta-paper);\n\n  /* ====================================================\n     TYPOGRAPHY\n     DM Sans for everything text — covers Latin Extended + full Cyrillic\n     (Bulgarian is the launch locale; localized country packs will add\n     more European scripts). JetBrains Mono for UI metadata, code,\n     status timestamps, IDs. The wordmark is its own custom mark.\n     ==================================================== */\n  --font-sans: \"DM Sans\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  /* --font-mono retired: aliases the sans stack so legacy references render DM Sans.\n     Category / metadata labels use .eyebrow (uppercase, tracked DM Sans). */\n  --font-mono: \"DM Sans\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n\n  /* Type scale — generous, accessibility-first. Ratio ~1.2 */\n  --t-display-lg: 64px;\n  --t-display:    48px;\n  --t-h1:         36px;\n  --t-h2:         28px;\n  --t-h3:         22px;\n  --t-h4:         18px;\n  --t-body-lg:    18px;\n  --t-body:       16px;\n  --t-body-sm:    14px;\n  --t-caption:    13px;\n  --t-micro:      11px;\n\n  --lh-tight:  1.1;   /* @kind font */\n  --lh-snug:   1.25;  /* @kind font */\n  --lh-normal: 1.45;  /* @kind font */\n  --lh-loose:  1.6;   /* @kind font */\n\n  --w-regular: 400;   /* @kind font */\n  --w-medium:  500;   /* @kind font */\n  --w-semi:    600;   /* @kind font */\n  --w-bold:    700;   /* @kind font */\n\n  /* ====================================================\n     RADII — soft geometry, never sharp\n     ==================================================== */\n  --r-xs:   4px;\n  --r-sm:   8px;\n  --r-md:   12px;\n  --r-lg:   16px;\n  --r-xl:   20px;\n  --r-2xl:  28px;\n  --r-pill: 9999px;\n\n  /* ====================================================\n     SHADOWS — soft, low contrast, \"trustworthy\" not \"floaty\"\n     ==================================================== */\n  --shadow-1: 0 1px 2px rgba(15, 26, 36, 0.04), 0 1px 1px rgba(15, 26, 36, 0.03);\n  --shadow-2: 0 4px 12px rgba(15, 26, 36, 0.06), 0 1px 2px rgba(15, 26, 36, 0.04);\n  --shadow-3: 0 12px 32px rgba(15, 26, 36, 0.10), 0 2px 6px rgba(15, 26, 36, 0.05);\n  --shadow-pop: 0 18px 48px rgba(15, 26, 36, 0.14);\n  --shadow-inset: inset 0 0 0 1px rgba(15, 26, 36, 0.06);\n\n  /* ====================================================\n     SPACING — 4pt grid\n     ==================================================== */\n  --s-1:  4px;\n  --s-2:  8px;\n  --s-3:  12px;\n  --s-4:  16px;\n  --s-5:  20px;\n  --s-6:  24px;\n  --s-7:  32px;\n  --s-8:  40px;\n  --s-9:  56px;\n  --s-10: 72px;\n  --s-11: 96px;\n\n  /* ====================================================\n     BRAND WASHES — two-stop, brand-locked\n     Marketing-only. Never use in product UI chrome (buttons, cards, etc.).\n     Names match preview/brand-gradients.html.\n     ==================================================== */\n  --wash-sunrise:   linear-gradient(135deg, #DEFB50 0%, #F35F49 100%);  /* @kind other */\n  --wash-dusk:      linear-gradient(135deg, #F35F49 0%, #571B32 100%);  /* @kind other */\n  --wash-night:     linear-gradient(180deg, #571B32 0%, #0F1A24 100%);  /* @kind other */\n  --wash-socratic:     linear-gradient(160deg, #BAE6FD 0%, #0F1A24 110%);  /* @kind other */\n  --wash-meadow:    linear-gradient(180deg, #ECFDA8 0%, #424F1A 100%);  /* @kind other */\n  --wash-paper:     linear-gradient(180deg, #FFFFFF 0%, #BAE6FD 100%);  /* @kind other */\n  --wash-heat:      linear-gradient(160deg, #F35F49 0%, #0F1A24 100%);  /* @kind other */\n  --wash-calm:      linear-gradient(180deg, #FFFFFF 0%, #F6ECF0 100%);  /* @kind other */\n\n  /* Photo scrims — the only gradients allowed on photography */\n  --scrim-bottom:   linear-gradient(180deg, transparent 0%, rgba(15,26,36,.60) 100%);  /* @kind other */\n  --scrim-top:      linear-gradient(0deg,   transparent 0%, rgba(15,26,36,.55) 100%);  /* @kind other */\n  --scrim-vignette: radial-gradient(120% 90% at 50% 50%, transparent 50%, rgba(15,26,36,.45) 100%);  /* @kind other */\n\n  /* ====================================================\n     BACKGROUND PATTERNS — quiet, learning-room textures\n     For full-bleed page / section grounds only. Never on cards, buttons,\n     chat bubbles, or any active product chrome — the grid is ambient, not UI.\n     ==================================================== */\n  --pattern-grid-bg:   #FBFBFA;                          /* almost-white paper */\n  --pattern-grid-line: rgba(15, 26, 36, 0.035);          /* one ink hairline */\n  --pattern-grid-size: 40px;                             /* cell size */\n  --pattern-grid:\n    linear-gradient(var(--pattern-grid-line) 1px, transparent 1px),\n    linear-gradient(90deg, var(--pattern-grid-line) 1px, transparent 1px);  /* @kind other */\n\n  /* ====================================================\n     MOTION — calm, never bouncy\n     ==================================================== */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1);    /* @kind other */\n  --ease-emphasis: cubic-bezier(0.3, 0, 0, 1);    /* @kind other */\n  --ease-exit:     cubic-bezier(0.4, 0, 1, 1);    /* @kind other */\n  --dur-fast:   140ms;  /* @kind other */\n  --dur-base:   220ms;  /* @kind other */\n  --dur-slow:   360ms;  /* @kind other */\n}\n\n/* ============================================================\n   Semantic element styles\n   Apply to bare HTML when this stylesheet is the only one in play.\n   ============================================================ */\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  font-size: var(--t-body);\n  line-height: var(--lh-normal);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 { font-size: var(--t-h1); font-weight: var(--w-bold); line-height: var(--lh-tight); letter-spacing: -0.02em; }\nh2, .h2 { font-size: var(--t-h2); font-weight: var(--w-bold); line-height: var(--lh-snug);  letter-spacing: -0.015em; }\nh3, .h3 { font-size: var(--t-h3); font-weight: var(--w-semi); line-height: var(--lh-snug);  letter-spacing: -0.01em; }\nh4, .h4 { font-size: var(--t-h4); font-weight: var(--w-semi); line-height: var(--lh-snug); }\n\np          { font-size: var(--t-body); line-height: var(--lh-normal); text-wrap: pretty; }\nsmall, .meta { font-size: var(--t-caption); color: var(--fg-3); }\ncode, kbd, pre, samp {\n  font-family: var(--font-sans);\n  font-size: 0.92em;\n}\n\n/* Display style for marketing: tighter, larger */\n.display    { font-size: var(--t-display);    font-weight: var(--w-bold); line-height: var(--lh-tight); letter-spacing: -0.025em; }\n.display-lg { font-size: var(--t-display-lg); font-weight: var(--w-bold); line-height: var(--lh-tight); letter-spacing: -0.03em; }\n\n/* \"Eyebrow\" — short uppercased label seen on marketing tiles */\n.eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--t-micro);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  font-weight: var(--w-semi);\n  color: var(--fg-3);\n}\n\n::selection { background: var(--connecta-lime); color: var(--connecta-ink); }\n\n/* Lime is the highlight / underline color — for emphasized words in body copy */\nmark, .highlight {\n  background: var(--connecta-lime);\n  color: var(--connecta-ink);\n  padding: 0 0.12em;\n  border-radius: 2px;\n  box-decoration-break: clone;\n  -webkit-box-decoration-break: clone;\n}\n.underline-lime {\n  text-decoration: underline;\n  text-decoration-color: var(--connecta-lime);\n  text-decoration-thickness: 0.18em;\n  text-underline-offset: 0.1em;\n}\n\n/* ============================================================\n   Background pattern utility\n   Apply to a page wrapper or section. Adds the soft notebook grid\n   with an optional radial fade so type sits on a calmer center.\n   ============================================================ */\n.soft-grid-bg {\n  background-color: var(--pattern-grid-bg);\n  background-image: var(--pattern-grid);\n  background-size: var(--pattern-grid-size) var(--pattern-grid-size);\n  background-position: center top;\n}\n.soft-grid-bg.faded {\n  position: relative;\n  overflow: hidden;\n}\n.soft-grid-bg.faded::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  background: radial-gradient(circle at center, rgba(255,255,255,0.35), rgba(255,255,255,0.85));\n}\n.soft-grid-bg > * { position: relative; z-index: 1; }\n\n@media (prefers-reduced-motion: reduce) {\n  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }\n}\n<\u002Fstyle>\n<script src=\"b7bd41e4-1cb5-4e54-a3af-a7559bcfa387\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{\n    background:var(--neutral-50);\n    color:var(--fg-1);\n    font-family:var(--font-sans);\n    font-size:15px;\n    line-height:1.6;\n    -webkit-font-smoothing:antialiased;\n  }\n  ::selection{background:var(--connecta-lime);color:var(--connecta-ink)}\n\n  /* ---------- top band ---------- */\n  .topbar{\n    position:sticky;top:0;z-index:40;\n    background:var(--connecta-ink);\n    border-bottom:1px solid rgba(255,255,255,.08);\n  }\n  .topbar-inner{\n    max-width:1120px;margin:0 auto;padding:12px 32px;\n    display:flex;align-items:center;gap:14px;\n  }\n  .nn{width:30px;height:30px;border-radius:8px;background:var(--connecta-lime);display:grid;place-items:center;font-weight:800;color:var(--connecta-coral);font-size:16px;letter-spacing:-.04em;flex:none}\n  .topbar b{color:#fff;font-size:14px;font-weight:700;letter-spacing:-.01em}\n  .topbar .x{color:rgba(255,255,255,.4);font-weight:600;padding:0 2px}\n  .topbar .prime{ grid;place-items:center;cursor:pointer}\n  .p-chip .x svg{width:11px;height:11px}\n\n  /* messages (inline) */\n  .p-msg{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:var(--r-md);font-size:14px;width:100%;border:1px solid transparent}\n  .p-msg .mi{flex:none;width:20px;height:20px}\n  .p-msg .mt b{font-weight:700}\n  .p-msg .mt{line-height:1.45}\n  .p-msg .mt small{display:block;color:inherit;opacity:.8;font-size:12.5px;margin-top:1px}\n  .msg-nudge{background:var(--state-nudge-bg);color:var(--state-nudge-fg)}\n  .msg-nudge .mi{color:var(--state-nudge-accent)}\n  .msg-ok{background:var(--state-ok-bg);color:var(--state-ok-fg)}\n  .msg-ok .mi{color:var(--state-ok-accent)}\n  .msg-socratic{background:var(--socratic-bg);color:var(--socratic-fg)}\n  .msg-socratic .mi{color:var(--connecta-olive)}\n  .msg-pause{background:var(--state-pause-bg);color:var(--state-pause-fg)}\n  .msg-pause .mi{color:var(--state-pause-accent)}\n\n  /* datatable */\n  .p-table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:0}\n  .p-table th{background:var(--neutral-50);text-align:left;padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3);border-bottom:1px solid var(--border-1)}\n  .p-table td{padding:12px 16px;border-bottom:1px solid var(--border-1);color:var(--fg-1)}\n  .p-table tr:last-child td{border-bottom:0}\n  .p-table tbody tr:hover{background:var(--neutral-50)}\n  .p-table .num{font-variant-numeric:tabular-nums;color:var(--fg-2)}\n\n  /* tabs */\n  .p-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border-1)}\n  .p-tab{font-size:14px;font-weight:600;color:var(--fg-3);padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.14s}\n  .p-tab:hover{color:var(--fg-1)}\n  .p-tab.on{color:var(--connecta-ink);border-bottom-color:var(--connecta-ink)}\n  .p-tab.on .u{box-shadow:inset 0 -8px 0 var(--connecta-lime)}\n\n  /* steps (Lab Circles 5-step) */\n  .p-steps{display:flex;align-items:center;width:100%;overflow:auto}\n  .p-step{display:flex;align-items:center;gap:0;flex:1;min-width:0}\n  .p-step .node{display:flex;flex-direction:column;align-items:center;gap:7px;flex:none;width:104px;text-align:center}\n  .p-step .num{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:700;background:var(--bg-card);border:1.5px solid var(--border-2);color:var(--fg-3)}\n  .p-step.done .num{background:var(--connecta-ink);border-color:var(--connecta-ink);color:#fff}\n  .p-step.now .num{background:var(--connecta-lime);border-color:var(--connecta-ink);color:var(--connecta-ink)}\n  .p-step .lbl{font-size:12px;font-weight:600;color:var(--fg-3)}\n  .p-step.now .lbl,.p-step.done .lbl{color:var(--fg-1)}\n  .p-step .bar{height:2px;flex:1;background:var(--border-1);margin:0 -8px;margin-bottom:24px}\n  .p-step.done .bar{background:var(--connecta-ink)}\n\n  /* dialog */\n  .p-dialog{border:1px solid var(--border-1);border-radius:var(--r-lg);background:var(--bg-card);box-shadow:var(--shadow-3);max-width:420px;overflow:hidden}\n  .p-dialog-head{display:flex;align-items:center;gap:10px;padding:18px 20px 14px;font-size:17px;font-weight:700}\n  .p-dialog-head .x{margin-left:auto;color:var(--fg-3);cursor:pointer;width:34px;height:34px;border-radius:8px;display:grid;place-items:center}\n  .p-dialog-head .x:hover{background:var(--neutral-100)}\n  .p-dialog-body{padding:0 20px 18px;color:var(--fg-2);font-size:14.5px}\n  .p-dialog-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--border-1);background:var(--neutral-50)}\n\n  .callout{display:grid;grid-template-columns:auto 1fr;gap:16px;border:1px solid var(--border-1);border-left:3px solid var(--connecta-coral);border-radius:0 var(--r-md) var(--r-md) 0;background:var(--bg-card);padding:18px 20px;margin:18px 0}\n  .callout .ic{color:var(--connecta-coral)}\n  .callout p{margin:0;font-size:14px;color:var(--fg-2)}\n  .callout p+p{margin-top:8px}\n  .callout b{color:var(--fg-1)}\n\n  .foot{margin-top:64px;padding-top:24px;border-top:1px solid var(--border-1);color:var(--fg-3);font-size:13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}\n<\u002Fstyle><\u002Fhead>\n<body>\n\n\n\n<header class=\"topbar\">\n  <div class=\"topbar-inner\">\n    <div class=\"nn\">nn<\u002Fdiv>\n    <b>Connecta<\u002Fb><span class=\"x\">×<\u002Fspan><span class=\"prime\">PrimeReact<\u002Fspan>\n    <nav class=\"topnav\">\n      <a href=\"#answer\">The answer<\u002Fa>\n      <a href=\"#approach\">Approach<\u002Fa>\n      <a href=\"#map\">Token map<\u002Fa>\n      <a href=\"#preset\">Preset code<\u002Fa>\n      <a href=\"#gallery\">Component proof<\u002Fa>\n      <a href=\"#custom\">Stays custom<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main class=\"page\">\n\n  <!-- HERO -->\n  <div class=\"hero\" id=\"answer\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> Engineering bridge · shared reference<\u002Fspan>\n    <h1>Can we build on <span class=\"u\">PrimeReact<\u002Fspan> without losing the Connecta look?<\u002Fh1>\n    <p class=\"lede\">Short version for the dev team: <b>yes — and without throwing away anything in this design system.<\u002Fb> PrimeReact themes through a layer of design tokens that compile to CSS variables. We point that layer at the variables already in <code>colors_and_type.css<\u002Fcode>, and PrimeReact's 90-plus components inherit the Connecta brand automatically. The CSS file stays the single source of truth.<\u002Fp>\n\n    <div class=\"verdict\">\n      <div class=\"mark\"><i data-lucide=\"check\"><\u002Fi><\u002Fdiv>\n      <div>\n        <h2>PrimeReact is the engine. Connecta is the skin. They don't fight.<\u002Fh2>\n        <p>Use PrimeReact in <b>styled mode<\u002Fb> with a custom <b>preset<\u002Fb> whose tokens reference Connecta's existing CSS variables (<code>var(--connecta-ink)<\u002Fcode>, <code>var(--r-md)<\u002Fcode>, …). Nothing about Connecta's palette, type, radii or spacing changes — it just becomes reachable from PrimeReact. The handful of truly Connecta-native surfaces (chat bubbles, GoodTalk &amp; Socratic banners, role badges) stay hand-built, exactly as they are now.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- APPROACH -->\n  <section id=\"approach\">\n    <div class=\"sec-head\"><span class=\"sec-num\">01<\u002Fspan><h2>How the pieces stack<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">PrimeReact (v10+) splits theming into three token tiers — primitive, semantic, component — that emit CSS custom properties prefixed <code>--p-<\u002Fcode>. We don't author a parallel palette there; we make those tiers <em>defer<\u002Fem> to Connecta's variables. One source of truth, read top-to-bottom:<\u002Fp>\n\n    <div class=\"layers\">\n      <div class=\"layer l-app\">\n        <div class=\"tag\">Your app<small>JSX<\u002Fsmall><\u002Fdiv>\n        <div class=\"body\"><b>PrimeReact components<\u002Fb> — <code>&lt;Button&gt;<\u002Fcode>, <code>&lt;DataTable&gt;<\u002Fcode>, <code>&lt;Dropdown&gt;<\u002Fcode>, <code>&lt;Calendar&gt;<\u002Fcode>… plus Connecta-native components for chat &amp; AI surfaces.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arrowrow\"><i data-lucide=\"arrow-down\"><\u002Fi><\u002Fdiv>\n      <div class=\"layer l-prime\">\n        <div class=\"tag\">PrimeReact<small>styled mode<\u002Fsmall><\u002Fdiv>\n        <div class=\"body\">Ships its own structural CSS, all of it driven by <code>--p-*<\u002Fcode> design tokens. No hard-coded colors in the components themselves.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arrowrow\"><i data-lucide=\"arrow-down\"><\u002Fi><\u002Fdiv>\n      <div class=\"layer l-token\">\n        <div class=\"tag\">Connecta preset<small>definePreset<\u002Fsmall><\u002Fdiv>\n        <div class=\"body\"><b>The bridge.<\u002Fb> Maps each <code>--p-*<\u002Fcode> token to a Connecta variable. ~60 lines, written once. This is the only new file engineering adds.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arrowrow\"><i data-lucide=\"arrow-down\"><\u002Fi><\u002Fdiv>\n      <div class=\"layer l-css\">\n        <div class=\"tag\">Connecta tokens<small>this repo<\u002Fsmall><\u002Fdiv>\n        <div class=\"body\"><code>colors_and_type.css<\u002Fcode> — the palette, type, radii, shadows, spacing you already approved. <b>Unchanged. Source of truth.<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"sub\">Styled mode vs. unstyled — the recommendation<\u002Fh3>\n    <div class=\"cols2\">\n      <div class=\"pathcard rec\">\n        <div class=\"pc-h\">\n          <div class=\"ic\"><i data-lucide=\"layout-template\"><\u002Fi><\u002Fdiv>\n          <h4>Styled mode + Connecta preset<\u002Fh4>\n          <span class=\"pill\">Recommended<\u002Fspan>\n        <\u002Fdiv>\n        <p>PrimeReact brings its component CSS; the preset recolors it through tokens. Least code, fastest to adopt, survives PrimeReact upgrades.<\u002Fp>\n        <ul>\n          <li>One ~60-line preset is the whole integration.<\u002Fli>\n          <li>Connecta's look is opinionated but <em>token-shaped<\u002Fem> (flat fills, hairlines, ink primary, fixed radii) — it maps cleanly.<\u002Fli>\n          <li>Designers keep editing <code>colors_and_type.css<\u002Fcode>; PrimeReact follows.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"pathcard alt\">\n        <div class=\"pc-h\">\n          <div class=\"ic\"><i data-lucide=\"square-pen\"><\u002Fi><\u002Fdiv>\n          <h4>Unstyled mode + passthrough<\u002Fh4>\n          <span class=\"pill\">Escape hatch<\u002Fspan>\n        <\u002Fdiv>\n        <p>PrimeReact ships zero CSS; you supply every class via the <code>pt<\u002Fcode> (passthrough) prop. Total control, much more code.<\u002Fp>\n        <ul>\n          <li>Reserve for the few components that must look exactly like a Connecta-native surface.<\u002Fli>\n          <li>Overkill as the default — you'd be rebuilding what the preset gives you for free.<\u002Fli>\n          <li>Both modes can coexist in one app.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TOKEN MAP -->\n  <section id=\"map\">\n    <div class=\"sec-head\"><span class=\"sec-num\">02<\u002Fspan><h2>Token map<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">The contract between the two systems. Left is the PrimeReact semantic token (what its components read); right is the Connecta variable we point it at. Light scheme only — dark mode is intentionally out of scope for now.<\u002Fp>\n\n    <h3 class=\"sub\">Core surface &amp; primary<\u002Fh3>\n    <div class=\"tbl-wrap\"><table>\n      <thead><tr><th>PrimeReact token<\u002Fth><th>Connecta variable<\u002Fth><th>Resolves to<\u002Fth><th>Why<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><code>primary.color<\u002Fcode><\u002Ftd><td><code>--connecta-ink<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#0F1A24\"><\u002Fspan>#0F1A24<\u002Ftd><td>Ink is Connecta's single primary action.<\u002Ftd><\u002Ftr>\n        <tr><td><code>primary.contrastColor<\u002Fcode><\u002Ftd><td><code>--connecta-paper<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#fff\"><\u002Fspan>#FFFFFF<\u002Ftd><td>Paper type on the ink button.<\u002Ftd><\u002Ftr>\n        <tr><td><code>primary.hoverColor<\u002Fcode><\u002Ftd><td><code>--neutral-800<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#1E2630\"><\u002Fspan>#1E2630<\u002Ftd><td>Hover darkens ~6%, no colour shift.<\u002Ftd><\u002Ftr>\n        <tr><td><code>surface.0<\u002Fcode><\u002Ftd><td><code>--neutral-0<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#fff\"><\u002Fspan>#FFFFFF<\u002Ftd><td>Card / paper ground.<\u002Ftd><\u002Ftr>\n        <tr><td><code>surface.50 → 900<\u002Fcode><\u002Ftd><td><code>--neutral-50 → 900<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#F7F8F9\"><\u002Fspan><span class=\"sw\" style=\"background:#C3CBD3\"><\u002Fspan><span class=\"sw\" style=\"background:#343C46\"><\u002Fspan>…<\u002Ftd><td>The cool neutral ramp, one-to-one.<\u002Ftd><\u002Ftr>\n        <tr><td><code>text.color<\u002Fcode><\u002Ftd><td><code>--fg-1<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#0F1A24\"><\u002Fspan>ink<\u002Ftd><td>Body type is always ink.<\u002Ftd><\u002Ftr>\n        <tr><td><code>text.mutedColor<\u002Fcode><\u002Ftd><td><code>--fg-3<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#6B7682\"><\u002Fspan>neutral-500<\u002Ftd><td>Secondary / meta text.<\u002Ftd><\u002Ftr>\n        <tr><td><code>content.borderColor<\u002Fcode><\u002Ftd><td><code>--border-1<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#DDE2E7\"><\u002Fspan>neutral-200<\u002Ftd><td>1px hairlines over shadows.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable><\u002Fdiv>\n\n    <h3 class=\"sub\">Form fields, focus, shape &amp; motion<\u002Fh3>\n    <div class=\"tbl-wrap\"><table>\n      <thead><tr><th>PrimeReact token<\u002Fth><th>Connecta variable<\u002Fth><th>Value<\u002Fth><th>Why<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><code>formField.borderRadius<\u002Fcode><\u002Ftd><td><code>--r-sm<\u002Fcode><\u002Ftd><td>8px<\u002Ftd><td>Connecta input radius.<\u002Ftd><\u002Ftr>\n        <tr><td><code>formField.focusBorderColor<\u002Fcode><\u002Ftd><td><code>--connecta-ink<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#0F1A24\"><\u002Fspan>ink<\u002Ftd><td>Focus ring is ink, 2px offset.<\u002Ftd><\u002Ftr>\n        <tr><td><code>formField.invalidBorderColor<\u002Fcode><\u002Ftd><td><code>--connecta-coral<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#F35F49\"><\u002Fspan>coral<\u002Ftd><td>Coral = error / invalid only.<\u002Ftd><\u002Ftr>\n        <tr><td><code>focusRing.color<\u002Fcode><\u002Ftd><td><code>--connecta-ink<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#0F1A24\"><\u002Fspan>ink<\u002Ftd><td>2px ink outline, always visible.<\u002Ftd><\u002Ftr>\n        <tr><td><code>borderRadius (button/sm/md/lg)<\u002Fcode><\u002Ftd><td><code>--r-md<\u002Fcode> · <code>--r-sm<\u002Fcode> · <code>--r-lg<\u002Fcode><\u002Ftd><td>12 · 8 · 16<\u002Ftd><td>Connecta's soft-geometry radii scale.<\u002Ftd><\u002Ftr>\n        <tr><td><code>transitionDuration<\u002Fcode><\u002Ftd><td><code>--dur-base<\u002Fcode><\u002Ftd><td>220ms<\u002Ftd><td>Calm, opacity-led motion.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable><\u002Fdiv>\n\n    <h3 class=\"sub\">Severities → Connecta semantic colours<\u002Fh3>\n    <p class=\"sec-sub\" style=\"margin-top:0\">PrimeReact's severity palette is opinionated (green/blue/yellow/red). Connecta's isn't — it's <em>meaning-locked<\u002Fem>. Remap the few you'll actually use; suppress the rest so nobody ships a stray traffic-light green.<\u002Fp>\n    <div class=\"tbl-wrap\"><table>\n      <thead><tr><th>PrimeReact severity<\u002Fth><th>Connecta meaning<\u002Fth><th>Token<\u002Fth><th>Colour<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><code>danger<\u002Fcode><\u002Ftd><td>Error / check / important (GoodTalk)<\u002Ftd><td><code>--connecta-coral<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#F35F49\"><\u002Fspan>coral<\u002Ftd><\u002Ftr>\n        <tr><td><code>success<\u002Fcode><\u002Ftd><td>Repair complete · “go”<\u002Ftd><td><code>--connecta-lime<\u002Fcode> on <code>--connecta-olive<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#DEFB50\"><\u002Fspan>lime<\u002Ftd><\u002Ftr>\n        <tr><td><code>info<\u002Fcode><\u002Ftd><td>Teacher / school / task<\u002Ftd><td><code>--connecta-sky<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#BAE6FD\"><\u002Fspan>sky<\u002Ftd><\u002Ftr>\n        <tr><td><code>secondary<\u002Fcode><\u002Ftd><td>Muted neutral action<\u002Ftd><td><code>--neutral-100<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#EEF1F3\"><\u002Fspan>neutral-100<\u002Ftd><\u002Ftr>\n        <tr><td><code>contrast<\u002Fcode><\u002Ftd><td>Inverse / ink<\u002Ftd><td><code>--connecta-ink<\u002Fcode><\u002Ftd><td><span class=\"sw\" style=\"background:#0F1A24\"><\u002Fspan>ink<\u002Ftd><\u002Ftr>\n        <tr><td><code>warn<\u002Fcode><\u002Ftd><td><em>Avoid.<\u002Fem> No amber in Connecta — escalate within coral instead.<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRESET CODE -->\n  <section id=\"preset\">\n    <div class=\"sec-head\"><span class=\"sec-num\">03<\u002Fspan><h2>The preset (drop-in)<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">This is the whole integration. One preset file plus a provider wrap. Because the tokens reference <code>var(--connecta-*)<\u002Fcode>, the values live in <code>colors_and_type.css<\u002Fcode> — edit a colour there and every PrimeReact component updates with no rebuild of this file.<\u002Fp>\n\n    <div class=\"code-head\"><span class=\"fdot\"><\u002Fspan><span class=\"fname\">connecta-preset.js<\u002Fspan><\u002Fdiv>\n    <pre class=\"code\"><code><span class=\"tok-com\">// PrimeReact v10+ design-token theming (@primeuix/themes).<\u002Fspan>\n<span class=\"tok-com\">// Tokens point at Connecta's existing CSS variables — colors_and_type.css stays the source of truth.<\u002Fspan>\n<span class=\"tok-key\">import<\u002Fspan> { definePreset } <span class=\"tok-key\">from<\u002Fspan> <span class=\"tok-str\">'@primeuix/themes'<\u002Fspan>;\n<span class=\"tok-key\">import<\u002Fspan> Aura <span class=\"tok-key\">from<\u002Fspan> <span class=\"tok-str\">'@primeuix/themes/aura'<\u002Fspan>; <span class=\"tok-com\">// base structure only — every colour is overridden below<\u002Fspan>\n\n<span class=\"tok-key\">export const<\u002Fspan> Connecta = <span class=\"tok-fn\">definePreset<\u002Fspan>(Aura, {\n  semantic: {\n    <span class=\"tok-com\">// — Primary = Ink (Connecta's single primary action) —<\u002Fspan>\n    primary: {\n      color:         <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>,\n      contrastColor: <span class=\"tok-str\">'var(--connecta-paper)'<\u002Fspan>,\n      hoverColor:    <span class=\"tok-str\">'var(--neutral-800)'<\u002Fspan>,\n      activeColor:   <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>,\n    },\n    <span class=\"tok-com\">// — Shape &amp; motion —<\u002Fspan>\n    borderRadius: {\n      none: <span class=\"tok-str\">'0'<\u002Fspan>, xs: <span class=\"tok-str\">'var(--r-xs)'<\u002Fspan>, sm: <span class=\"tok-str\">'var(--r-sm)'<\u002Fspan>,\n      md: <span class=\"tok-str\">'var(--r-md)'<\u002Fspan>, lg: <span class=\"tok-str\">'var(--r-lg)'<\u002Fspan>, xl: <span class=\"tok-str\">'var(--r-xl)'<\u002Fspan>,\n    },\n    transitionDuration: <span class=\"tok-str\">'var(--dur-base)'<\u002Fspan>,\n    focusRing: {\n      width: <span class=\"tok-str\">'2px'<\u002Fspan>, style: <span class=\"tok-str\">'solid'<\u002Fspan>, offset: <span class=\"tok-str\">'2px'<\u002Fspan>,\n      color: <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>,\n    },\n    formField: {\n      borderRadius:        <span class=\"tok-str\">'var(--r-sm)'<\u002Fspan>,\n      focusBorderColor:    <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>,\n      invalidBorderColor:  <span class=\"tok-str\">'var(--connecta-coral)'<\u002Fspan>,\n      paddingX: <span class=\"tok-str\">'14px'<\u002Fspan>, paddingY: <span class=\"tok-str\">'11px'<\u002Fspan>,\n    },\n    colorScheme: {\n      light: {\n        surface: {\n          0: <span class=\"tok-str\">'var(--neutral-0)'<\u002Fspan>,   50: <span class=\"tok-str\">'var(--neutral-50)'<\u002Fspan>,  100: <span class=\"tok-str\">'var(--neutral-100)'<\u002Fspan>,\n          200: <span class=\"tok-str\">'var(--neutral-200)'<\u002Fspan>, 300: <span class=\"tok-str\">'var(--neutral-300)'<\u002Fspan>, 400: <span class=\"tok-str\">'var(--neutral-400)'<\u002Fspan>,\n          500: <span class=\"tok-str\">'var(--neutral-500)'<\u002Fspan>, 600: <span class=\"tok-str\">'var(--neutral-600)'<\u002Fspan>, 700: <span class=\"tok-str\">'var(--neutral-700)'<\u002Fspan>,\n          800: <span class=\"tok-str\">'var(--neutral-800)'<\u002Fspan>, 900: <span class=\"tok-str\">'var(--neutral-900)'<\u002Fspan>, 950: <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>,\n        },\n        text:    { color: <span class=\"tok-str\">'var(--fg-1)'<\u002Fspan>, mutedColor: <span class=\"tok-str\">'var(--fg-3)'<\u002Fspan> },\n        content: { background: <span class=\"tok-str\">'var(--bg-card)'<\u002Fspan>, borderColor: <span class=\"tok-str\">'var(--border-1)'<\u002Fspan> },\n      },\n    },\n  },\n  components: {\n    <span class=\"tok-com\">// Remap severities to Connecta's meaning-locked colours.<\u002Fspan>\n    <span class=\"tok-com\">// (Token names sit under components.&lt;name&gt;.colorScheme.light — generate<\u002Fspan>\n    <span class=\"tok-com\">//  against your installed version with the PrimeReact Theme Designer.)<\u002Fspan>\n    button: {\n      colorScheme: {\n        light: {\n          danger:    { background: <span class=\"tok-str\">'var(--connecta-coral)'<\u002Fspan>, color: <span class=\"tok-str\">'var(--connecta-paper)'<\u002Fspan> },\n          secondary: { background: <span class=\"tok-str\">'var(--neutral-100)'<\u002Fspan>,    color: <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>  },\n          contrast:  { background: <span class=\"tok-str\">'var(--connecta-ink)'<\u002Fspan>,    color: <span class=\"tok-str\">'var(--connecta-paper)'<\u002Fspan> },\n        },\n      },\n    },\n  },\n});<\u002Fcode><\u002Fpre>\n\n    <div style=\"height:18px\"><\u002Fdiv>\n    <div class=\"code-head\"><span class=\"fdot\"><\u002Fspan><span class=\"fname\">main.jsx — wire it in once, light only<\u002Fspan><\u002Fdiv>\n    <pre class=\"code\"><code><span class=\"tok-key\">import<\u002Fspan> { PrimeReactProvider } <span class=\"tok-key\">from<\u002Fspan> <span class=\"tok-str\">'primereact/api'<\u002Fspan>;\n<span class=\"tok-key\">import<\u002Fspan> { Connecta } <span class=\"tok-key\">from<\u002Fspan> <span class=\"tok-str\">'./connecta-preset'<\u002Fspan>;\n<span class=\"tok-key\">import<\u002Fspan> <span class=\"tok-str\">'primereact/resources/primereact.min.css'<\u002Fspan>;\n<span class=\"tok-key\">import<\u002Fspan> <span class=\"tok-str\">'./colors_and_type.css'<\u002Fspan>; <span class=\"tok-com\">// ← the source of truth, loaded first<\u002Fspan>\n\n<span class=\"tok-key\">export default function<\u002Fspan> <span class=\"tok-fn\">Root<\u002Fspan>() {\n  <span class=\"tok-key\">return<\u002Fspan> (\n    &lt;<span class=\"tok-fn\">PrimeReactProvider<\u002Fspan> value={{\n      theme: { preset: Connecta, options: { darkModeSelector: <span class=\"tok-key\">false<\u002Fspan> } },\n    }}&gt;\n      &lt;<span class=\"tok-fn\">App<\u002Fspan> /&gt;\n    &lt;/<span class=\"tok-fn\">PrimeReactProvider<\u002Fspan>&gt;\n  );\n}<\u002Fcode><\u002Fpre>\n\n    <div class=\"callout\">\n      <div class=\"ic\"><i data-lucide=\"git-branch\"><\u002Fi><\u002Fdiv>\n      <div>\n        <p><b>Version note for the dev.<\u002Fb> The token-preset model above is <b>PrimeReact v10+<\u002Fb> (the <code>@primeuix/themes<\u002Fcode> engine). If you're on v9 or an older SCSS-theme build, the same result is reached differently — either override the theme's CSS variables directly, or use unstyled mode + passthrough. Confirm which major version you're pinning before wiring this up; the exact component-token names also shift between minors, so generate the <code>components<\u002Fcode> block against your installed version.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- GALLERY -->\n  <section id=\"gallery\">\n    <div class=\"sec-head\"><span class=\"sec-num\">04<\u002Fspan><h2>Component proof<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">PrimeReact's core components, rendered through the Connecta preset. These are styled with the exact tokens above — what the dev ships should look like this. Still ink-primary, still hairlines, still DM Sans, still coral-for-error-only.<\u002Fp>\n\n    <div class=\"gal-note\">\n      <span class=\"ic\"><i data-lucide=\"info\"><\u002Fi><\u002Fspan>\n      <div>These previews recreate PrimeReact's component structure with Connecta tokens for a visual reference — <b>they are not the live library<\u002Fb>. In the app, the real PrimeReact components produce this look via the preset; you don't hand-write this CSS.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Buttons -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">Button<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-button<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"demo-body\">\n        <button class=\"p-btn p-btn--primary\"><i data-lucide=\"send\"><\u002Fi> Send<\u002Fbutton>\n        <button class=\"p-btn p-btn--secondary\">Save draft<\u002Fbutton>\n        <button class=\"p-btn p-btn--outlined\">Cancel<\u002Fbutton>\n        <button class=\"p-btn p-btn--text\">Learn more<\u002Fbutton>\n        <button class=\"p-btn p-btn--danger\"><i data-lucide=\"trash-2\"><\u002Fi> Remove<\u002Fbutton>\n        <button class=\"p-btn p-btn--danger-out\">Report<\u002Fbutton>\n        <button class=\"p-btn p-btn--primary p-btn--icon\"><i data-lucide=\"plus\"><\u002Fi><\u002Fbutton>\n        <button class=\"p-btn p-btn--primary p-btn--rounded\">Rounded<\u002Fbutton>\n        <button class=\"p-btn p-btn--primary\" disabled=\"\">Disabled<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Inputs -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">InputText · Dropdown · Textarea<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-inputtext<\u002Fspan><span class=\"ct\">p-dropdown<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"demo-body\" style=\"align-items:flex-start\">\n        <div class=\"p-field\">\n          <label class=\"field-lbl\">Class name<\u002Flabel>\n          <input class=\"p-input\" value=\"5а — Homeroom\">\n          <span class=\"p-help\">Visible to the whole class circle.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"p-field\">\n          <label class=\"field-lbl\">Country pack<\u002Flabel>\n          <div class=\"p-select\">\n            <select class=\"p-input\"><option>Bulgaria — МОН 2024<\u002Foption><option>Generic EU<\u002Foption><\u002Fselect>\n            <i data-lucide=\"chevron-down\" class=\"chev\"><\u002Fi>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p-field\">\n          <label class=\"field-lbl\">Due date<\u002Flabel>\n          <input class=\"p-input p-input--invalid\" value=\"32.13.2026\">\n          <span class=\"p-help p-help--err\">Use a valid date from the country pack format.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Selection controls -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">Checkbox · RadioButton · InputSwitch · Slider<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-checkbox<\u002Fspan><span class=\"ct\">p-inputswitch<\u002Fspan><span class=\"ct\">p-slider<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"demo-body\" style=\"gap:28px\">\n        <label class=\"p-check\"><span class=\"p-box on\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan> GoodTalk on<\u002Flabel>\n        <label class=\"p-check\"><span class=\"p-box\"><\u002Fspan> Notify parents<\u002Flabel>\n        <label class=\"p-check p-radio\"><span class=\"p-box on\"><\u002Fspan> Whole class<\u002Flabel>\n        <label class=\"p-check p-radio\"><span class=\"p-box\"><\u002Fspan> Selected circle<\u002Flabel>\n        <label class=\"p-check\"><span class=\"p-switch on\"><i><\u002Fi><\u002Fspan> Read-only thread<\u002Flabel>\n        <div style=\"display:flex;flex-direction:column;gap:8px\"><span class=\"field-lbl\" style=\"margin:0\">Risk sensitivity<\u002Fspan><div class=\"p-slider\"><div class=\"fill\"><\u002Fdiv><div class=\"knob\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Tags / Chips → role badges -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">Tag · Chip<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-tag<\u002Fspan><span class=\"ct\">p-chip<\u002Fspan><span class=\"ct\">→ role badges<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"demo-body\" style=\"gap:18px\">\n        <span class=\"p-tag\" style=\"background:var(--role-child-bg);color:var(--role-child-fg)\">Child<\u002Fspan>\n        <span class=\"p-tag\" style=\"background:var(--role-teacher-bg);color:var(--role-teacher-fg)\">Teacher<\u002Fspan>\n        <span class=\"p-tag\" style=\"background:var(--role-parent-bg);color:var(--role-parent-fg)\">Parent<\u002Fspan>\n        <span class=\"p-tag\" style=\"background:var(--role-school-bg);color:var(--role-school-fg)\">School<\u002Fspan>\n        <span class=\"p-tag\" style=\"background:var(--role-socratic-bg);color:var(--role-socratic-fg)\">Socratic<\u002Fspan>\n        <span class=\"p-tag\" style=\"background:var(--role-goodtalk-bg);color:var(--role-goodtalk-fg)\">GoodTalk<\u002Fspan>\n        <span class=\"p-chip\">Иван П. <span class=\"x\"><i data-lucide=\"x\"><\u002Fi><\u002Fspan><\u002Fspan>\n        <span class=\"p-chip\">Maria K. <span class=\"x\"><i data-lucide=\"x\"><\u002Fi><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Messages → GoodTalk / Socratic states -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">Message (inline)<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-message<\u002Fspan><span class=\"ct\">→ GoodTalk + Socratic states<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"demo-body col\">\n        <div class=\"p-msg msg-nudge\"><span class=\"mi\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fspan><div class=\"mt\"><b>That might hurt someone. Want to rephrase?<\u002Fb><small>GoodTalk · nudge — coral state, calm not alarmist.<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n        <div class=\"p-msg msg-socratic\"><span class=\"mi\"><i data-lucide=\"compass\"><\u002Fi><\u002Fspan><div class=\"mt\"><b>Good start. How will you reduce the measurement error?<\u002Fb><small>Socratic · Socratic — olive ground, never gives the answer.<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n        <div class=\"p-msg msg-ok\"><span class=\"mi\"><i data-lucide=\"check-circle\"><\u002Fi><\u002Fspan><div class=\"mt\"><b>Nice rewrite. Sent.<\u002Fb><small>Repair complete — resolves to lime “go”.<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n        <div class=\"p-msg msg-pause\"><span class=\"mi\"><i data-lucide=\"pause-circle\"><\u002Fi><\u002Fspan><div class=\"mt\"><b>Let's pause for 2 minutes so this doesn't escalate.<\u002Fb><small>Cooldown — calm ink wash.<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DataTable -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">DataTable<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-datatable<\u002Fspan><span class=\"ct\">→ school admin / audit log<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"overflow:auto\">\n        <table class=\"p-table\">\n          <thead><tr><th>Time<\u002Fth><th>Class<\u002Fth><th>Event<\u002Fth><th>Role<\u002Fth><th style=\"text-align:right\">Status<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td class=\"num\">09:41<\u002Ftd><td>5а<\u002Ftd><td>Task sent — 22 students<\u002Ftd><td><span class=\"p-tag\" style=\"background:var(--role-teacher-bg);color:var(--role-teacher-fg)\">Teacher<\u002Fspan><\u002Ftd><td style=\"text-align:right\"><span class=\"p-tag\" style=\"background:var(--state-ok-bg);color:var(--state-ok-fg)\">Delivered<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td class=\"num\">09:38<\u002Ftd><td>5а<\u002Ftd><td>GoodTalk nudge — rephrase offered<\u002Ftd><td><span class=\"p-tag\" style=\"background:var(--role-goodtalk-bg);color:var(--role-goodtalk-fg)\">GoodTalk<\u002Fspan><\u002Ftd><td style=\"text-align:right\"><span class=\"p-tag\" style=\"background:var(--tint-coral);color:var(--connecta-ink)\">Resolved<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td class=\"num\">09:30<\u002Ftd><td>7b<\u002Ftd><td>Parent thread opened (read-only)<\u002Ftd><td><span class=\"p-tag\" style=\"background:var(--role-parent-bg);color:var(--role-parent-fg)\">Parent<\u002Fspan><\u002Ftd><td style=\"text-align:right\"><span class=\"p-tag\" style=\"background:var(--neutral-100);color:var(--fg-2)\">Open<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td class=\"num\">09:12<\u002Ftd><td>—<\u002Ftd><td>Audit log exported · 24-month retention<\u002Ftd><td><span class=\"p-tag\" style=\"background:var(--role-school-bg);color:var(--role-school-fg)\">School<\u002Fspan><\u002Ftd><td style=\"text-align:right\"><span class=\"p-tag\" style=\"background:var(--state-ok-bg);color:var(--state-ok-fg)\">Verified<\u002Fspan><\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cols2\">\n      <!-- Tabs -->\n      <div class=\"demo\">\n        <div class=\"demo-head\"><span class=\"cmp\">TabView<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-tabview<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:0 22px\">\n          <div class=\"p-tabs\">\n            <div class=\"p-tab on\"><span class=\"u\">Circles<\u002Fspan><\u002Fdiv>\n            <div class=\"p-tab\">Tasks<\u002Fdiv>\n            <div class=\"p-tab\">Parents<\u002Fdiv>\n            <div class=\"p-tab\">Audit<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:18px 22px 24px;color:var(--fg-2);font-size:14px\">Active tab marked with an ink underline; the label sits on the lime highlight — Connecta's underline-tag pattern, expressed through PrimeReact's TabView.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Dialog -->\n      <div class=\"demo\">\n        <div class=\"demo-head\"><span class=\"cmp\">Dialog<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-dialog<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:24px 22px;display:grid;place-items:center;background:var(--neutral-100)\">\n          <div class=\"p-dialog\">\n            <div class=\"p-dialog-head\"><i data-lucide=\"shield-alert\" style=\"width:20px;height:20px;color:var(--connecta-coral)\"><\u002Fi> Notify adults?<span class=\"x\"><i data-lucide=\"x\" style=\"width:17px;height:17px\"><\u002Fi><\u002Fspan><\u002Fdiv>\n            <div class=\"p-dialog-body\">We notify adults only when there's real risk. You're not in trouble — we just want to help.<\u002Fdiv>\n            <div class=\"p-dialog-foot\"><button class=\"p-btn p-btn--text p-btn--sm\">Not now<\u002Fbutton><button class=\"p-btn p-btn--primary p-btn--sm\">Notify<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Steps -->\n    <div class=\"demo\">\n      <div class=\"demo-head\"><span class=\"cmp\">Steps<\u002Fspan><div class=\"tags\"><span class=\"ct\">p-steps<\u002Fspan><span class=\"ct\">→ Lab Circles (5-step)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"demo-body\">\n        <div class=\"p-steps\">\n          <div class=\"p-step done\"><div class=\"node\"><div class=\"num\"><i data-lucide=\"check\" style=\"width:15px;height:15px\"><\u002Fi><\u002Fdiv><div class=\"lbl\">Hypothesis<\u002Fdiv><\u002Fdiv><div class=\"bar\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"p-step done\"><div class=\"node\"><div class=\"num\"><i data-lucide=\"check\" style=\"width:15px;height:15px\"><\u002Fi><\u002Fdiv><div class=\"lbl\">Variables<\u002Fdiv><\u002Fdiv><div class=\"bar\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"p-step now\"><div class=\"node\"><div class=\"num\">3<\u002Fdiv><div class=\"lbl\">Measure<\u002Fdiv><\u002Fdiv><div class=\"bar\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"p-step\"><div class=\"node\"><div class=\"num\">4<\u002Fdiv><div class=\"lbl\">Analysis<\u002Fdiv><\u002Fdiv><div class=\"bar\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"p-step\"><div class=\"node\"><div class=\"num\">5<\u002Fdiv><div class=\"lbl\">Conclusion<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STAYS CUSTOM -->\n  <section id=\"custom\">\n    <div class=\"sec-head\"><span class=\"sec-num\">05<\u002Fspan><h2>What stays custom<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">PrimeReact covers the generic 90% — forms, tables, overlays, navigation. The Connecta-native surfaces below have no PrimeReact equivalent and carry the brand's load-bearing identity. Keep them hand-built (they already are, in <code>ui_kits/<\u002Fcode>). They sit <em>alongside<\u002Fem> PrimeReact, sharing the same tokens.<\u002Fp>\n\n    <div class=\"cols2\">\n      <div class=\"pathcard alt\">\n        <div class=\"pc-h\"><div class=\"ic\"><i data-lucide=\"message-circle\"><\u002Fi><\u002Fdiv><h4>Chat bubbles<\u002Fh4><\u002Fdiv>\n        <p>Self / friend / teacher / parent / Socratic / GoodTalk bubble colours encode <em>who is speaking<\u002Fem>. That's a Connecta invention — built from <code>--bubble-*<\u002Fcode> tokens, not a PrimeReact component.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pathcard alt\">\n        <div class=\"pc-h\"><div class=\"ic\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fdiv><h4>GoodTalk &amp; Socratic banners<\u002Fh4><\u002Fdiv>\n        <p>The in-flow intervention banner and Socratic's Socratic panel have bespoke behaviour and voice. PrimeReact's <code>Message<\u002Fcode> can host simpler inline notes, but the AI surfaces stay native.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pathcard alt\">\n        <div class=\"pc-h\"><div class=\"ic\"><i data-lucide=\"badge-check\"><\u002Fi><\u002Fdiv><h4>Role badges<\u002Fh4><\u002Fdiv>\n        <p>The school-graph identity pills (Child · Teacher · Parent · School · Socratic · GoodTalk). Trivial to render with a PrimeReact <code>Tag<\u002Fcode> + the <code>--role-*<\u002Fcode> tokens — shown in the gallery above.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pathcard alt\">\n        <div class=\"pc-h\"><div class=\"ic\"><i data-lucide=\"square-asterisk\"><\u002Fi><\u002Fdiv><h4>Wordmark &amp; app icon<\u002Fh4><\u002Fdiv>\n        <p>Custom marks, never type set in DM Sans. Pure SVG assets in <code>assets/<\u002Fcode> — outside any component library.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"ic\"><i data-lucide=\"list-checks\"><\u002Fi><\u002Fdiv>\n      <div>\n        <p><b>For the dev, in one line:<\u002Fb> add PrimeReact, drop in <code>connecta-preset.js<\u002Fcode>, wrap the app in <code>PrimeReactProvider<\u002Fcode> with <code>darkModeSelector: false<\u002Fcode>, keep loading <code>colors_and_type.css<\u002Fcode>. Use PrimeReact for forms / tables / overlays / nav; keep the chat &amp; AI surfaces native. Nothing in this design system gets deleted or restyled.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"foot\">\n    <div class=\"nn\" style=\"width:22px;height:22px;border-radius:6px;font-size:12px\">nn<\u002Fdiv>\n    Connecta Design System · PrimeReact engineering bridge · light scheme · reference for designers + engineers\n  <\u002Fdiv>\n\n<\u002Fmain>\n\n<script>lucide.createIcons({ attrs: { 'stroke-width': 1.75 } });<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>

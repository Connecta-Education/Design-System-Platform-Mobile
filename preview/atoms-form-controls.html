<!doctype html>
<!-- @dsCard group="Molecules" name="Molecules — Form controls" subtitle="Switch · Checkbox · Radio · RadioCard · Segmented" viewport="760x420" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .blk{display:flex;flex-direction:column;gap:12px}
  .h{font:600 11px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);padding-bottom:6px;border-bottom:1px solid var(--border-1)}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .lab{font:500 13px var(--font-sans);color:var(--fg-2)}
  /* switch */
  .sw{width:40px;height:24px;border-radius:9999px;background:var(--neutral-300);position:relative;flex:none}
  .sw::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;box-shadow:0 1px 2px rgba(0,0,0,.18);transition:left .18s}
  .sw.on{background:var(--connecta-ink)}.sw.on::after{left:19px}
  .sw.dis{opacity:.45}
  /* checkbox */
  .cb{width:20px;height:20px;border-radius:6px;box-shadow:inset 0 0 0 1.5px var(--border-2);background:#fff;display:flex;align-items:center;justify-content:center;flex:none}
  .cb.on{background:var(--connecta-ink);box-shadow:none}
  .cb svg{width:13px;height:13px;color:#fff}
  /* radio */
  .rd{width:20px;height:20px;border-radius:50%;box-shadow:inset 0 0 0 1.5px var(--border-2);background:#fff;flex:none;display:flex;align-items:center;justify-content:center}
  .rd.on{box-shadow:inset 0 0 0 2px var(--connecta-ink)}
  .rd.on::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--connecta-ink)}
  /* radio card */
  .rcard{display:flex;align-items:center;gap:10px;border:1.5px solid var(--border-1);border-radius:12px;padding:12px 14px;min-width:150px;cursor:pointer}
  .rcard.on{border-color:var(--connecta-ink);background:var(--neutral-50)}
  .rcard .t{font:600 13px var(--font-sans);color:var(--fg-1)}
  .rcard .s{font:400 11px var(--font-sans);color:var(--fg-3)}
  /* segmented */
  .seg{display:inline-flex;background:var(--neutral-100);border-radius:10px;padding:3px}
  .seg button{border:0;background:transparent;font:600 13px var(--font-sans);color:var(--fg-2);padding:7px 16px;border-radius:8px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--fg-1);box-shadow:var(--shadow-1)}
</style>
<div class="grid">
  <div class="blk">
    <div class="h">Switch</div>
    <div class="row"><span class="sw on"></span><span class="lab">On</span><span class="sw"></span><span class="lab">Off</span><span class="sw on dis"></span><span class="lab">Disabled</span></div>
    <div class="h" style="margin-top:6px">Checkbox</div>
    <div class="row">
      <span class="cb on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span><span class="lab">Checked</span>
      <span class="cb"></span><span class="lab">Unchecked</span>
    </div>
    <div class="h" style="margin-top:6px">Radio</div>
    <div class="row"><span class="rd on"></span><span class="lab">Selected</span><span class="rd"></span><span class="lab">Unselected</span></div>
  </div>
  <div class="blk">
    <div class="h">Segmented control</div>
    <div class="row"><div class="seg"><button class="on">Week</button><button>Month</button><button>Term</button></div></div>
    <div class="h" style="margin-top:6px">Radio card</div>
    <div class="row">
      <label class="rcard on"><span class="rd on"></span><span><span class="t">Whole group</span><br><span class="s">One rule for all</span></span></label>
      <label class="rcard"><span class="rd"></span><span><span class="t">Per child</span><br><span class="s">Individual pace</span></span></label>
    </div>
  </div>
</div>
<div style="margin-top:16px" class="label-eyebrow">form controls · selected = ink · ≥44px hit target on mobile · same visuals web + mobile</div>
</body></html>

<!doctype html>
<!-- @dsCard group="Atoms" name="Spacing — Shadows" subtitle="Resting / hover / modal / inset · web + mobile" viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body style="background:#F7F8F9">
<div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:18px;padding:8px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:90px;height:60px;background:white;border-radius:12px;box-shadow:0 1px 2px rgba(15,26,36,.04), 0 1px 1px rgba(15,26,36,.03)"></div>
    <div class="swatch-meta">shadow-1 · resting</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:90px;height:60px;background:white;border-radius:12px;box-shadow:0 4px 12px rgba(15,26,36,.06), 0 1px 2px rgba(15,26,36,.04)"></div>
    <div class="swatch-meta">shadow-2 · hover</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:90px;height:60px;background:white;border-radius:12px;box-shadow:0 12px 32px rgba(15,26,36,.10), 0 2px 6px rgba(15,26,36,.05)"></div>
    <div class="swatch-meta">shadow-3 · modal</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:90px;height:60px;background:white;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(15,26,36,.06)"></div>
    <div class="swatch-meta">inset · input rest</div>
  </div>
</div>
<div style="margin-top:18px;padding:14px 16px;background:#fff;border:1px solid #DDE2E7;border-radius:12px;max-width:620px">
  <div class="label-eyebrow" style="margin-bottom:6px">On mobile</div>
  <div style="font:500 13px/1.5 var(--font-sans);color:#4D5762">Same tokens. Resting cards &amp; list rows use <b style="color:#0F1A24;font-weight:600">shadow-1</b>; bottom sheets &amp; dialogs use <b style="color:#0F1A24;font-weight:600">shadow-3</b>. There is no hover on touch — skip <b style="color:#0F1A24;font-weight:600">shadow-2</b> (hover) and lean on the ground color for separation.</div>
</div>
</body></html>

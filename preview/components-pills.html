<!doctype html>
<!-- @dsCard group="Molecules" name="Molecules — Role badge" subtitle="Role pills — the only place filled pills are used" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .pill-eyebrow{font:600 11px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
  .pill-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .pill{
    display:inline-flex;align-items:center;
    font:600 12px/1 var(--font-sans);letter-spacing:.01em;
    padding:7px 13px;border-radius:9999px;
  }
</style>

<div class="pill-eyebrow">Role badges · school graph</div>
<div class="pill-row">
  <span class="pill" style="background:var(--role-child-bg);color:var(--role-child-fg)">Child</span>
  <span class="pill" style="background:var(--role-teacher-bg);color:var(--role-teacher-fg)">Teacher</span>
  <span class="pill" style="background:var(--role-parent-bg);color:var(--role-parent-fg)">Parent</span>
  <span class="pill" style="background:var(--role-school-bg);color:var(--role-school-fg)">School</span>
  <span class="pill" style="background:var(--connecta-olive);color:var(--connecta-lime)">Socrat AI</span>
  <span class="pill" style="background:var(--connecta-plum);color:var(--connecta-pink)">GoodTalk</span>
</div>

<div style="margin-top:20px" class="label-eyebrow">pills are reserved for role badges only · identity by ground color, not chrome</div>
</body></html>

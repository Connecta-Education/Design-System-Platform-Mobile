<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Flags & country" subtitle="Country packs · Bulgaria-first · EU expansion" viewport="760x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .h{font:600 11px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border-1)}
  .row{display:flex;flex-wrap:wrap;gap:10px}
  .c{display:flex;align-items:center;gap:10px;border:1px solid var(--border-1);border-radius:9999px;padding:7px 14px 7px 8px;background:#fff}
  .c.on{border-color:var(--connecta-ink);box-shadow:var(--shadow-1)}
  .flag{width:26px;height:18px;border-radius:4px;flex:none;box-shadow:inset 0 0 0 1px rgba(15,26,36,.08)}
  .nm{font:600 13px var(--font-sans);color:var(--fg-1)}
  .lc{font:500 11px var(--font-mono);color:var(--fg-3);margin-left:2px}
  .tag{font:600 9px var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--connecta-paper);background:var(--connecta-ink);border-radius:9999px;padding:3px 7px;margin-left:4px}
</style>
<div class="h">Country selector · launch + packs</div>
<div class="row">
  <div class="c on"><span class="flag" style="background:linear-gradient(180deg,#fff 33.3%,#00966E 33.3% 66.6%,#D62612 66.6%)"></span><span class="nm">България</span><span class="lc">bg-BG</span><span class="tag">launch</span></div>
  <div class="c"><span class="flag" style="background:linear-gradient(90deg,#008C45 33.3%,#fff 33.3% 66.6%,#CD212A 66.6%)"></span><span class="nm">Italia</span><span class="lc">it-IT</span></div>
  <div class="c"><span class="flag" style="background:linear-gradient(90deg,#0055A4 33.3%,#fff 33.3% 66.6%,#EF4135 66.6%)"></span><span class="nm">France</span><span class="lc">fr-FR</span></div>
  <div class="c"><span class="flag" style="background:linear-gradient(180deg,#000 33.3%,#DD0000 33.3% 66.6%,#FFCE00 66.6%)"></span><span class="nm">Deutschland</span><span class="lc">de-DE</span></div>
  <div class="c"><span class="flag" style="background:linear-gradient(90deg,#002B7F 33.3%,#FCD116 33.3% 66.6%,#CE1126 66.6%)"></span><span class="nm">România</span><span class="lc">ro-RO</span></div>
  <div class="c"><span class="flag" style="background:linear-gradient(90deg,#21468B 33.3%,#fff 33.3% 66.6%,#AE1C28 66.6%)"></span><span class="nm">Nederland</span><span class="lc">nl-NL</span></div>
</div>
<div style="margin-top:18px" class="h">In context · onboarding row</div>
<div style="display:flex;align-items:center;gap:10px;border:1px solid var(--border-1);border-radius:12px;padding:12px 14px;max-width:360px;background:var(--bg-card)">
  <span class="flag" style="width:30px;height:21px;background:linear-gradient(180deg,#fff 33.3%,#00966E 33.3% 66.6%,#D62612 66.6%)"></span>
  <div style="flex:1"><div style="font:600 14px var(--font-sans);color:var(--fg-1)">България</div><div style="font:400 12px var(--font-sans);color:var(--fg-3)">EU servers · Bulgarian pack</div></div>
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--fg-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
</div>
<div style="margin-top:14px" class="label-eyebrow">flags · simple tricolours only · country packs add locale + flag · EU-resident by default</div>
</body></html>

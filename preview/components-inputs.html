<!doctype html>
<!-- @dsCard group="Molecules" name="Molecules — Input & Textarea" subtitle="All states · web + mobile" viewport="700x420" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body style="width:680px">
<style>
  .cols{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start}
  .ch{font:600 11px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border-1)}
  .st{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .st .lab{font:500 11px var(--font-sans);color:var(--fg-3)}
  .field{width:100%;background:#fff;border:0;border-radius:12px;padding:12px 14px;font:400 14px var(--font-sans);color:var(--connecta-ink);box-sizing:border-box;outline:none}
  .field.default{box-shadow:inset 0 0 0 1px rgba(15,26,36,.10)}
  .field.placeholder{box-shadow:inset 0 0 0 1px rgba(15,26,36,.10);color:var(--fg-4)}
  .field.focus{box-shadow:inset 0 0 0 2px var(--connecta-ink)}
  .field.filled{box-shadow:inset 0 0 0 1px rgba(15,26,36,.22)}
  .field.error{box-shadow:inset 0 0 0 2px var(--connecta-coral)}
  .field.success{box-shadow:inset 0 0 0 2px var(--connecta-olive)}
  .field.disabled{background:var(--neutral-100);color:var(--fg-4);box-shadow:inset 0 0 0 1px rgba(15,26,36,.06)}
  .note{font:500 12px var(--font-sans);margin-top:1px}
  .note.err{color:var(--connecta-coral)}
  .note.ok{color:var(--connecta-olive)}

  /* phone */
  .phone{background:#fff;border:1px solid var(--border-1);border-radius:32px;box-shadow:var(--shadow-3);overflow:hidden}
  .phone .sb{display:flex;justify-content:space-between;align-items:center;padding:12px 22px 6px;font:600 12px var(--font-sans);color:var(--fg-1)}
  .phone .sb .dots{display:flex;gap:4px}.phone .sb .dots i{width:5px;height:5px;border-radius:9999px;background:var(--fg-3);display:block}
  .phone .screen{padding:16px;display:flex;flex-direction:column;gap:14px;background:var(--bg-page)}
  /* mobile fields: 16px text (no iOS zoom), 48px min height */
  .mfield{width:100%;background:#fff;border:0;border-radius:14px;padding:14px 16px;font:400 16px var(--font-sans);color:var(--connecta-ink);box-sizing:border-box;min-height:50px;outline:none}
  .mfield.default{box-shadow:inset 0 0 0 1px rgba(15,26,36,.12)}
  .mfield.focus{box-shadow:inset 0 0 0 2px var(--connecta-ink)}
  .mfield.filled{box-shadow:inset 0 0 0 1px rgba(15,26,36,.22)}
  .mfield.error{box-shadow:inset 0 0 0 2px var(--connecta-coral)}
  .mfield.success{box-shadow:inset 0 0 0 2px var(--connecta-olive)}
  .mfield.disabled{background:var(--neutral-100);color:var(--fg-4)}
</style>

<div class="cols">
  <div>
    <div class="ch">Web — all states</div>
    <div class="st"><span class="lab">Default / placeholder</span><input class="field placeholder" value="Write a message"/></div>
    <div class="st"><span class="lab">Focus</span><input class="field focus" value="Coming to football tomorrow?"/></div>
    <div class="st"><span class="lab">Filled</span><input class="field filled" value="bring the ball"/></div>
    <div class="st"><span class="lab">Error</span><input class="field error" value="" placeholder="Write a message"/><span class="note err">Please add a message before sending</span></div>
    <div class="st"><span class="lab">Success</span><input class="field success" value="Saved to your circle"/><span class="note ok">Looks good</span></div>
    <div class="st"><span class="lab">Disabled</span><input class="field disabled" value="Slow mode — try again in 2 min" disabled/></div>
  </div>

  <div>
    <div class="ch">Mobile native</div>
    <div class="phone">
      <div class="sb"><span>9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
      <div class="screen">
        <input class="mfield default" value="" placeholder="Write a message"/>
        <input class="mfield focus" value="Coming to football?"/>
        <input class="mfield filled" value="bring the ball"/>
        <div><input class="mfield error" value="" placeholder="Write a message"/><div class="note err" style="margin-top:6px">Add a message first</div></div>
        <div><input class="mfield success" value="Saved to your circle"/><div class="note ok" style="margin-top:6px">Looks good</div></div>
        <input class="mfield disabled" value="Slow mode · 2 min" disabled/>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:8px" class="label-eyebrow">inputs · ink focus ring · coral errors · olive success · mobile fields 16px text (no zoom), ≥48px target</div>
</body></html>
